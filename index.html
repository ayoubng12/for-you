<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For You 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0010;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Stars background */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--d) ease-in-out infinite alternate;
      opacity: 0;
    }

    @keyframes twinkle {
      0%   { opacity: 0.1; transform: scale(0.8); }
      100% { opacity: 0.9; transform: scale(1.2); }
    }

    /* Floating hearts */
    .floater {
      position: fixed;
      bottom: -60px;
      font-size: 24px;
      animation: floatUp var(--du) ease-in forwards;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 90%;
    }

    /* ── BEFORE state ── */
    #before {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      animation: fadeIn 1.2s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pre-label {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: #e8b4d0;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
    }

    .love-btn {
      position: relative;
      background: transparent;
      border: 2px solid #e8749a;
      color: #f0b8ce;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      padding: 1.1rem 2.8rem;
      border-radius: 60px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .love-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, #c2185b44, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .love-btn:hover {
      border-color: #f48fb1;
      color: #fce4ec;
      box-shadow: 0 0 28px #e91e6344, 0 0 60px #ad145644;
      transform: scale(1.04);
    }

    .love-btn:hover::before { opacity: 1; }
    .love-btn:active { transform: scale(0.97); }

    .heart-icon {
      font-size: 2.6rem;
      animation: heartbeat 1.4s ease-in-out infinite;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.22); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.15); }
      70%       { transform: scale(1); }
    }

    /* ── AFTER state ── */
    #after {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
    }

    #after.show {
      display: flex;
      animation: revealIn 1s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes revealIn {
      from { opacity: 0; transform: scale(0.7) translateY(40px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .big-heart {
      font-size: 5rem;
      animation: heartbeat 1.2s ease-in-out infinite;
      filter: drop-shadow(0 0 18px #e91e63bb);
    }

    .message {
      font-family: 'Playfair Display', serif;
      color: #fce4ec;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      line-height: 1.35;
      text-shadow: 0 0 30px #e91e6366;
    }

    .sub-message {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 1.05rem;
      color: #f8bbd0;
      letter-spacing: 0.07em;
      line-height: 1.7;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, #e91e63, transparent);
    }

    /* Burst sparkles */
    .burst {
      position: fixed;
      pointer-events: none;
      z-index: 20;
    }

    .spark {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: spark var(--sd) ease-out forwards;
    }

    @keyframes spark {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="card">
  <!-- BEFORE -->
  <div id="before">
    <div class="heart-icon">🌸</div>
    <p class="pre-label">I have something to tell you…</p>
    <button class="love-btn" onclick="reveal(event)">
      Click here if you love me 💗
    </button>
  </div>

  <!-- AFTER -->
  <div id="after">
    <div class="big-heart">❤️</div>
    <p class="message">I love you too, my bae</p>
    <div class="divider"></div>
    <p class="sub-message">
      Happy Eid, my dalola 🌙<br/>
      I am so excited to see you ✨
    </p>
  </div>
</div>

<script>
  /* ── Stars ── */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 140; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${sz}px; height:${sz}px;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      --d:${(Math.random()*3+1.5).toFixed(1)}s;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  /* ── Floating hearts loop ── */
  const emojis = ['❤️','💕','💖','💗','💓','🌸','✨','💫'];
  function launchHeart() {
    const h = document.createElement('div');
    h.className = 'floater';
    h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    h.style.cssText = `
      left:${Math.random()*95}%;
      font-size:${(Math.random()*20+14).toFixed(0)}px;
      --du:${(Math.random()*4+3).toFixed(1)}s;
    `;
    document.body.appendChild(h);
    h.addEventListener('animationend', () => h.remove());
  }
  setInterval(launchHeart, 600);

  /* ── Sparkle burst on click ── */
  function burst(x, y) {
    const wrap = document.createElement('div');
    wrap.className = 'burst';
    wrap.style.cssText = `left:${x}px; top:${y}px;`;
    const colors = ['#e91e63','#f48fb1','#fce4ec','#ff80ab','#ff4081','#fff'];
    for (let i = 0; i < 20; i++) {
      const sp = document.createElement('div');
      sp.className = 'spark';
      const angle = Math.random()*360;
      const dist  = Math.random()*90 + 30;
      sp.style.cssText = `
        background:${colors[Math.floor(Math.random()*colors.length)]};
        --sd:${(Math.random()*0.5+0.4).toFixed(2)}s;
        --tx:${(Math.cos(angle*Math.PI/180)*dist).toFixed(0)}px;
        --ty:${(Math.sin(angle*Math.PI/180)*dist).toFixed(0)}px;
        animation-delay:${(Math.random()*0.1).toFixed(2)}s;
      `;
      wrap.appendChild(sp);
    }
    document.body.appendChild(wrap);
    setTimeout(() => wrap.remove(), 1200);
  }

  /* ── Reveal ── */
  function reveal(e) {
    burst(e.clientX, e.clientY);
    document.getElementById('before').style.display = 'none';
    const after = document.getElementById('after');
    after.classList.add('show');
    for (let i = 0; i < 6; i++) setTimeout(launchHeart, i*80);
  }
</script>
</body>
</html>
